<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <title>World Clock</title>
</head>
<body>
    <div class="container">
    <h1>World Clock</h1>

    <select name="" id="cities">
        <option value="">Select a city</option>
        <option value="">London</option>
        <option value="">Cape Town</option>
        <option value="">New York</option>
        <option value="">Tokyo</option>
    </select>
    <div class="cityTime">
    <div class="city">
        <h2>Los Angeles</h2>
    </div>
 <div class="time" id="los-angeles">
        12:32:07 <small>AM</small>
    </div>   
</div>
<div class="date" id="la-date">
        Friday, April 10 2026
    </div>

    <div class="cityTime">
    <div class="city">
        <h2>Durban</h2>
    </div>
 <div class="time" id="durban">
        12:32:07 <small>AM</small>
    </div>   
</div>
<div class="date" id="dbn-date">
        Friday, April 10 2026
</div>
</div>
    <footer>
        This project was coded by <a href="https://www.linkedin.com/in/nsindiso-ngcobo" target="_blank">Nsindiso N.</a> and is <a href="https://github.com/nsindittngcobo-wq/world-clock" target="_blank">open-sourced on Github</a>, and is hosted on <a href="https://world-clock.nsindittngcobo.workers.dev/" target="_blank">Cloudfare.</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
