<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>World Clock</title>
</head>
<body>
    <div class="container">
    <h1>World Clock</h1>

    <select name="" id="cities">
        <option value="">Select a city</option>
        <option value="">London</option>
        <option value="">Cape Town</option>
        <option value="">New York</option>
        <option value="">Tokyo</option>
    </select>
    <div class="cityTime">
    <div class="city">
        <h2>Los Angeles</h2>
    </div>
 <div class="time">
        12:32:07 <small>AM</small>
    </div>   
</div>
<div class="date">
        Friday, April 10 2026
    </div>
    
    <footer>
        This project was coded by Nsindiso N. and is <a href="https://github.com/nsindittngcobo-wq/world-clock" target="_blank">open-sourced on Github</a>, and is hosted on <a href="https://world-clock.nsindittngcobo.workers.dev/" target="_blank">Cloudfare.</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
